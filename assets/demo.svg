<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="13">
  <style>
    @keyframes typing { from { opacity: 0 } to { opacity: 1 } }
    .bg { fill: #0d1117 }
    .frame { fill: #161b22; rx: 8 }
    .titlebar { fill: #1c2128 }
    .dot-r { fill: #f85149 } .dot-y { fill: #d29922 } .dot-g { fill: #3fb950 }
    .title { fill: #8b949e; font-size: 11px }
    .text { fill: #e6edf3 }
    .muted { fill: #8b949e }
    .green { fill: #3fb950 }
    .blue { fill: #58a6ff }
    .yellow { fill: #d29922 }
    .line { opacity: 0; animation: typing 0.1s forwards }
  </style>
  <rect class="bg" width="720" height="480"/>
  <rect class="frame" x="20" y="10" width="680" height="460"/>
  <rect class="titlebar" x="20" y="10" width="680" height="32" rx="8"/>
  <rect class="titlebar" x="20" y="34" width="680" height="8"/>
  <circle class="dot-r" cx="40" cy="26" r="5"/>
  <circle class="dot-y" cx="56" cy="26" r="5"/>
  <circle class="dot-g" cx="72" cy="26" r="5"/>
  <text class="title" x="360" y="30" text-anchor="middle">Token Tool MCP</text>

  <g transform="translate(40, 65)">
    <text class="text line" style="animation-delay:0.3s" y="0">🔧 Token Tool MCP — Demo</text>
    <text class="muted line" style="animation-delay:0.5s" y="18">─────────────────────────</text>

    <text class="blue line" style="animation-delay:1.5s" y="48">Agent: "Estimate cost to deploy on Sepolia"</text>
    <text class="muted line" style="animation-delay:2.5s" y="68">→ Calling estimate_cost...</text>
    <text class="text line" style="animation-delay:3.2s" y="92">  Chain:   Sepolia Testnet</text>
    <text class="text line" style="animation-delay:3.4s" y="110">  Gas:     ~0.001 ETH</text>
    <text class="text line" style="animation-delay:3.6s" y="128">  Fee:     Testnet — free</text>

    <text class="blue line" style="animation-delay:5.5s" y="162">Agent: "Deploy a token called Green Bond A,</text>
    <text class="blue line" style="animation-delay:5.7s" y="180">        1M supply on Sepolia, whitelist + pausable"</text>
    <text class="muted line" style="animation-delay:7s" y="204">→ Calling deploy_token...</text>
    <text class="yellow line" style="animation-delay:8s" y="224">  Deploying CertiK-audited ERC-20...</text>
    <text class="yellow line" style="animation-delay:9.5s" y="242">  ⏳ Waiting for confirmation...</text>

    <text class="green line" style="animation-delay:12s" y="270">  ✅ Deployed successfully!</text>
    <text class="text line" style="animation-delay:12.5s" y="296">  Contract:  0x575083d9...bD3202</text>
    <text class="text line" style="animation-delay:12.7s" y="314">  Chain:     Sepolia Testnet</text>
    <text class="text line" style="animation-delay:12.9s" y="332">  Name:      Green Bond A</text>
    <text class="text line" style="animation-delay:13.1s" y="350">  Supply:    1,000,000</text>
    <text class="text line" style="animation-delay:13.3s" y="368">  Features:  whitelist ✓  pausable ✓</text>

    <text class="muted line" style="animation-delay:15s" y="398">─────────────────────────</text>
    <text class="blue line" style="animation-delay:15.2s" y="416">github.com/thendrix-eng/token-tool-mcp</text>
  </g>
</svg>
