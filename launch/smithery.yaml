name: token-tool-mcp
displayName: Bitbond TokenTool MCP
description: Deploy and manage compliant ERC20 tokens from Claude, Cursor, or any AI agent. CertiK-audited contracts. 10 EVM chains. Full token lifecycle — deploy, mint, burn, pause, transfer, query.
version: 1.0.0
author: Bitbond GmbH
license: MIT
homepage: https://tokentool.bitbond.com
repository: https://github.com/bitbond/token-tool-mcp

categories:
  - blockchain
  - web3
  - finance
  - developer-tools

tags:
  - erc20
  - token
  - tokenization
  - rwa
  - blockchain
  - ethereum
  - polygon
  - ai-agents
  - smart-contracts
  - compliance
  - defi

tools:
  - name: deploy_token
    description: Deploy a compliant ERC20 token with optional whitelist, blacklist, pausable, force transfer, and document URI features
  - name: mint_tokens
    description: Mint additional tokens to any address
  - name: burn_tokens
    description: Burn tokens from an address
  - name: pause_token
    description: Pause all token transfers
  - name: unpause_token
    description: Resume token transfers
  - name: transfer_tokens
    description: Transfer tokens between addresses
  - name: force_transfer
    description: Force transfer tokens (compliance feature)
  - name: whitelist_address
    description: Add or remove an address from the whitelist
  - name: blacklist_address
    description: Add or remove an address from the blacklist
  - name: get_token_info
    description: Query live token details and on-chain state
  - name: list_deployed_tokens
    description: List all tokens deployed through this MCP instance

config:
  env:
    - name: BITBOND_PRIVATE_KEY
      description: EVM wallet private key for signing transactions (0x prefixed)
      required: true
      secret: true

startCommand:
  type: stdio
  command: node
  args: ["src/index.js"]
